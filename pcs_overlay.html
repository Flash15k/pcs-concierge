<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PCS Concierge Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .overlay img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin: 20px 0 18px;
    }

    .divider-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #C6A65A);
    }

    .divider-line.right {
      background: linear-gradient(90deg, #C6A65A, transparent);
    }

    .divider-diamond {
      width: 8px;
      height: 8px;
      background: #C6A65A;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 28px;
      color: #C6A65A;
      letter-spacing: 0.5px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <img src="/public/PCS_CONCIERGE5555.png" alt="PCS Concierge"/>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line right"></div>
    </div>
    <div class="tagline">Your Move, Professionally Coordinated.</div>
  </div>
</body>
</html>
